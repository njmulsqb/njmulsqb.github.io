<ul class="tags-socials-icons">
    <li>share</li>
    <li> 
        <a  href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ site.baseurl }}{{ page.url }}"
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            title="Share on LinkedIn" rel="noopener noreferrer" >
            <i class="fab fa-linkedin-in"></i>
        </a>
    </li>
    <li> 
        <a  href="https://twitter.com/intent/tweet?text={{ page.title }}&url={{ site.url }}{{ site.baseurl }}{{ page.url }}"
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            title="Share on X" rel="noopener noreferrer" >
            <i class="fab fa-x-twitter"></i>
        </a>
    </li>
    <li> 
        <a  href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ site.baseurl }}{{ page.url }}"
            onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
            title="Share on Facebook" rel="noopener noreferrer" >
            <i class="fab fa-facebook-f"></i>
        </a>
    </li>
    <li> 
        <a  href="https://pinterest.com/pin/create/button/?url=&media={{ site.url }}{{page.post_image }}&description=" onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=900,height=500,toolbar=1,resizable=0'); return false;" title="Share on Pinterest" rel="noopener noreferrer" >
            <i class="fab fa-pinterest"></i>
        </a>
    </li>
</ul>
